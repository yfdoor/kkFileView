name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: '输入要构建的版本号 (例如 4.4.0)'
        required: true
        type: string

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: yfdoor/kkfileview

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from tag
        uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.build_version }}

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven (Skip Tests)
        run: mvn clean package -DskipTests  # 核心修改点：跳过测试

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.event.inputs.build_version }}
